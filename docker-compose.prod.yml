services:
  serietime-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: serietime-server
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./apps/server/data:/app/apps/server/data
    env_file:
      - .env
    # Fuseau du conteneur : sans ça il tourne en UTC et les bornes « aujourd'hui »
    # des stats/file divergeaient de l'heure de Paris (décalage de quelques heures
    # autour de minuit). La gamification calcule déjà en Europe/Paris explicitement.
    environment:
      TZ: Europe/Paris
    restart: unless-stopped
    # Débridé le 2026-07-22 (512m/1cpu → 2g/1.5cpu) : le VPS a 7,8 Go de RAM
    # dont ~6,5 libres et tournait à vide — la DB (425 Mo) ne tenait même pas
    # dans l'ancienne limite (cache SQLite étranglé). Le site photo (priorité
    # absolue) consomme ~250 Mo + <1 % CPU : il garde 0,5 vCPU réservé et
    # ~5 Go de marge. Les PRAGMA SQLite (cache 64 Mo + mmap 256 Mo) supposent
    # cette limite à 2 Go.
    mem_limit: 2g
    cpus: "1.5"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3
    # Rotation des logs : borne l'espace disque (sinon json-file grandit sans fin).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
